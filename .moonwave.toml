title = "ElectionSystem"
description = "A universal, modular election system for Roblox supporting 14 voting methods and multiple electoral structures."
subtitle = "Universal Roblox Election System"

navbar = [
  { name = "GitHub", url = "https://github.com/metricrb/election-system" },
  { name = "Quick Start", url = "/election-system/#getting-started" },
]

classOrder = [
  "ElectionManager",
  "Store",
  "Network",
  "Data",
  "ResultCalculator",
  "VotingMethods",
  "SeatAllocator",
  "DistrictManager",
  "CoalitionSystem",
  "RoundManager",
  "EligibilityChecker",
  "AltDetector",
  "BallotFormatter",
  "TimestampManager",
  "ElectionDiagnostics",
]

classGroups = [
  { name = "Core", classes = ["ElectionManager"] },
  { name = "State Management", classes = ["Store", "Network", "Data"] },
  { name = "Elections & Results", classes = ["ResultCalculator", "RoundManager", "VotingMethods"] },
  { name = "Seats & Districts", classes = ["SeatAllocator", "DistrictManager", "CoalitionSystem"] },
  { name = "Validation & Detection", classes = ["EligibilityChecker", "AltDetector"] },
  { name = "Utilities", classes = ["BallotFormatter", "TimestampManager", "ElectionDiagnostics"] },
]

output = "docs"
pathPattern = "src/**.lua"
sourceUrl = "https://github.com/metricrb/election-system/blob/{branch}/{path}#{line}"
gitBranch = "main"
