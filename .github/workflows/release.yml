name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Download Rojo (linux x86_64)
        run: |
          set -euo pipefail
          url=$(curl -sL https://api.github.com/repos/rojo-rbx/rojo/releases/latest \
            | grep -oP '"browser_download_url": "\K[^"]+' \
            | grep -F 'linux-x86_64' \
            | head -1)
          curl -sL "$url" -o rojo.zip
          unzip -o rojo.zip
          chmod +x rojo

      - name: Build .rbxm artifact
        run: ./rojo build default.project.json --output ElectionSystem.rbxm

      - name: Create Release (tag push only)
        id: create_release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Release Asset (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./ElectionSystem.rbxm
          asset_name: ElectionSystem.rbxm
          asset_content_type: application/octet-stream

      - name: Upload Artifact (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ElectionSystem
          path: ElectionSystem.rbxm
