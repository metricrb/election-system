name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Rojo (linux x86_64)
        run: |
          set -euo pipefail
          url=$(curl -sL https://api.github.com/repos/rojo-rbx/rojo/releases/latest \
            | grep -oP '"browser_download_url": "\K[^"]+' \
            | grep -F 'linux-x86_64' \
            | head -1)
          curl -sL "$url" -o rojo.zip
          unzip -o rojo.zip
          chmod +x rojo

      - name: Build .rbxl place file
        run: ./rojo build release.project.json --output ElectionSystem.rbxl

      - name: Verify artifact
        run: test -s ElectionSystem.rbxl && ls -la ElectionSystem.rbxl

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ElectionSystem.rbxl
          generate_release_notes: true

      - name: Upload artifact (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ElectionSystem
          path: ElectionSystem.rbxl
